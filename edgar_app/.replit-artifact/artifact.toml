kind = "api"
previewPath = "/"
title = "Bousala Investor Compass"
version = "1.0.0"

[[services]]
localPort = 5000
name = "Bousala App"
paths = ["/"]

[services.development]
run = "streamlit run edgar_app/app.py --server.address=0.0.0.0 --server.port=5000"

[services.production]

[services.production.run]
args = ["streamlit", "run", "edgar_app/app.py", "--server.address=0.0.0.0", "--server.port=5000"]

[services.production.run.env]
PORT = "5000"
