kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[[services]]
localPort = 5000
name = "Bousala App"
paths = ["/"]

[services.development]
run = "python -m streamlit run edgar_app/app.py --server.address=0.0.0.0 --server.port=5000"

[services.production.run]
args = ["sh", "-c", "python -m streamlit run edgar_app/app.py --server.address=0.0.0.0 --server.port=5000"]

[services.production.health.startup]
path = "/_stcore/health"
